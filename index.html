<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界一の工具屋 - ハイエース荷室カスタム & プロツール</title>

  <!-- Google Fonts & GSAP Animation Library -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --bg-dark: #121212;
      --panel-dark: #1e1e1e;
      --accent-yellow: #ffb703;
      --accent-orange: #fb8500;
      --text-light: #f8f9fa;
      --text-dim: #a0a0a0;
      --line-green: #06C755;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans JP', sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      overflow-x: hidden;
    }

    /* ヒーローセクション (GSAP連動) */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at center, #2a2a2a 0%, var(--bg-dark) 70%);
      position: relative;
    }

    .hero h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900;
      color: var(--accent-yellow);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(255, 183, 3, 0.3);
    }

    .hero p {
      font-size: 1.2rem;
      color: var(--text-dim);
      margin-bottom: 2rem;
    }

    /* メインコンテナ */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .section-title {
      font-size: 2rem;
      border-left: 6px solid var(--accent-yellow);
      padding-left: 1rem;
      margin-bottom: 2rem;
      color: var(--text-light);
    }

    /* 荷室シミュレーターグリッド */
    .sim-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      background: var(--panel-dark);
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid #333;
    }

    @media (max-width: 768px) {
      .sim-grid { grid-template-columns: 1fr; }
    }

    /* SVGビジュアル表示領域 */
    .sim-visual {
      background: #0a0a0a;
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hiace-svg {
      width: 100%;
      height: auto;
      max-height: 350px;
    }

    /* 動的パーツのデフォルトスタイル */
    .part-item {
      opacity: 0.15;
      transition: all 0.4s ease;
      transform-origin: center;
    }

    .part-item.active {
      opacity: 1;
      filter: drop-shadow(0 0 8px var(--accent-yellow));
    }

    /* シミュレーターコントロール */
    .sim-controls {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .sim-opt {
      background: #2a2a2a;
      border: 2px solid #444;
      color: var(--text-light);
      padding: 1rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      transition: all 0.2s;
    }

    .sim-opt:hover {
      border-color: var(--accent-yellow);
    }

    .sim-opt.on {
      border-color: var(--accent-yellow);
      background: rgba(255, 183, 3, 0.1);
      color: var(--accent-yellow);
    }

    .sim-summary {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #444;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.4rem;
    }

    .sim-total-price {
      color: var(--accent-yellow);
      font-weight: 900;
      font-size: 1.8rem;
    }

    .btn-action {
      display: block;
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 1rem;
      transition: transform 0.2s, opacity 0.2s;
    }

    .btn-action:active { transform: scale(0.98); }
    .btn-line { background: var(--line-green); color: white; }
    .btn-submit { background: var(--accent-orange); color: white; }

    /* 在庫・予約データ連携セクション */
    .stock-section {
      margin-top: 4rem;
      background: var(--panel-dark);
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid #333;
    }

    .stock-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .stock-card {
      background: #2a2a2a;
      padding: 1rem;
      border-radius: 8px;
      border-left: 4px solid var(--accent-yellow);
    }

    .stock-status {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }

    .status-ok { background: #2e7d32; color: white; }
    .status-low { background: #c62828; color: white; }

    /* モーダルフォーム */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-dim);
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 0.8rem;
      background: #121212;
      border: 1px solid #444;
      color: white;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <!-- GSAPアニメーション：ヒーロー -->
  <section class="hero">
    <h1 id="hero-title">NO TOOL, NO LIFE.</h1>
    <p id="hero-sub">世界一の工具と、最強のハイエース荷室をつくる。</p>
  </section>

  <div class="container">
    
    <!-- 1. 荷室シミュレーター -->
    <h2 class="section-title">ハイエース荷室カスタム シミュレーター</h2>
    <div class="sim-grid">
      
      <!-- SVG描画領域 -->
      <div class="sim-visual">
        <svg class="hiace-svg" viewBox="0 0 600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- ハイエース車体フレーム外観 -->
          <rect x="50" y="50" width="500" height="180" rx="20" stroke="#555" stroke-width="4" fill="#181818" />
          <path d="M 50 180 L 550 180" stroke="#333" stroke-width="2" />
          <circle cx="120" cy="240" r="25" fill="#333" stroke="#666" stroke-width="4"/>
          <circle cx="480" cy="240" r="25" fill="#333" stroke="#666" stroke-width="4"/>
          
          <!-- 動的パーツ（初期は半透明・非アクティブ） -->
          <!-- 床張りウッドパネル -->
          <rect id="svg-floor" class="part-item" x="70" y="210" width="420" height="15" fill="#d4a373" />
          
          <!-- ヘビーデューティー棚 -->
          <g id="svg-rack" class="part-item">
            <rect x="80" y="90" width="120" height="120" fill="#4a5568" stroke="#cbd5e0" stroke-width="2"/>
            <line x1="80" y1="130" x2="200" y2="130" stroke="#cbd5e0" stroke-width="2"/>
            <line x1="80" y1="170" x2="200" y2="170" stroke="#cbd5e0" stroke-width="2"/>
          </g>

          <!-- 天井LEDライティング -->
          <g id="svg-led" class="part-item">
            <line x1="80" y1="65" x2="480" y2="65" stroke="#ffb703" stroke-width="6" stroke-linecap="round"/>
            <polygon points="100,68 120,150 80,150" fill="rgba(255,183,3,0.15)"/>
            <polygon points="280,68 300,150 260,150" fill="rgba(255,183,3,0.15)"/>
            <polygon points="440,68 460,150 420,150" fill="rgba(255,183,3,0.15)"/>
          </g>

          <!-- 100V 電源ポータブルバッテリーユニット -->
          <g id="svg-power" class="part-item">
            <rect x="400" y="150" width="80" height="60" rx="5" fill="#e63946"/>
            <circle cx="420" cy="170" r="6" fill="#fff"/>
            <circle cx="440" cy="170" r="6" fill="#fff"/>
          </g>
        </svg>
      </div>

      <!-- コントロールパネル -->
      <div class="sim-controls">
        <div class="sim-opt" data-part="floor" data-price="88000">
          <span>頑丈重荷重 床張りキット</span>
          <span>¥88,000</span>
        </div>
        <div class="sim-opt" data-part="rack" data-price="125000">
          <span>サイドスチールラック棚</span>
          <span>¥125,000</span>
        </div>
        <div class="sim-opt" data-part="led" data-price="45000">
          <span>高輝度 天井埋込LED照明</span>
          <span>¥45,000</span>
        </div>
        <div class="sim-opt" data-part="power" data-price="150000">
          <span>100V 大容量サブバッテリー</span>
          <span>¥150,000</span>
        </div>

        <div class="sim-summary">
          <span>概算合計（税込）:</span>
          <span class="sim-total-price" id="sim-total">¥0</span>
        </div>

        <button class="btn-action btn-line" id="btn-line-send">
          💬 この構成のままLINEでお見積り・相談
        </button>
      </div>
    </div>

    <!-- 2. GAS連携：リアルタイム在庫表示＆店舗施工予約 -->
    <div class="stock-section" id="booking-section">
      <h2 class="section-title">リアルタイム在庫 ＆ ピット施工予約</h2>
      
      <p style="color: var(--text-dim);">スプレッドシート（GAS）と連動して最新の在庫状況を表示しています。</p>
      
      <div class="stock-list" id="stock-container">
        <!-- GASからデータを読み込むまでのダミー表示 -->
        <div class="stock-card">読み込み中...</div>
      </div>

      <form id="gas-booking-form" style="margin-top: 2rem;">
        <h3 style="margin-bottom: 1rem; color: var(--accent-yellow);">カスタム施工ピットの予約</h3>
        <div class="form-group">
          <label>お名前</label>
          <input type="text" id="book-name" required placeholder="職人 太郎">
        </div>
        <div class="form-group">
          <label>希望希望プラン</label>
          <select id="book-plan">
            <option>シミュレーターの構成で相談</option>
            <option>店頭でツール選び＆相談</option>
          </select>
        </div>
        <div class="form-group">
          <label>ご来店希望日</label>
          <input type="date" id="book-date" required>
        </div>
        <button type="submit" class="btn-action btn-submit" id="btn-submit-booking">
          GASへ送信して予約を確定する
        </button>
      </form>
    </div>

  </div>

  <script>
    // ==========================================
    // 1. GSAP アニメーション設定
    // ==========================================
    gsap.registerPlugin(ScrollTrigger);

    // ヒーローテキストのアニメーション
    gsap.from("#hero-title", {
      duration: 1.2,
      y: 50,
      opacity: 0,
      ease: "power4.out"
    });
    gsap.from("#hero-sub", {
      duration: 1.2,
      y: 30,
      opacity: 0,
      delay: 0.3,
      ease: "power4.out"
    });

    // スクロールに応じたセクションフェードイン
    gsap.from(".sim-grid", {
      scrollTrigger: {
        trigger: ".sim-grid",
        start: "top 80%",
      },
      duration: 1,
      y: 40,
      opacity: 0,
      ease: "power2.out"
    });

    // ==========================================
    // 2. シミュレーター ＆ SVGリアルタイム連動
    // ==========================================
    const options = document.querySelectorAll('.sim-opt');
    const totalEl = document.getElementById('sim-total');
    let totalPrice = 0;

    options.forEach(opt => {
      opt.addEventListener('click', () => {
        opt.classList.toggle('on');
        
        const partId = opt.getAttribute('data-part');
        const price = parseInt(opt.getAttribute('data-price'));
        const targetSvgPart = document.getElementById(`svg-${partId}`);

        if (opt.classList.contains('on')) {
          totalPrice += price;
          // SVGパーツをアクティブ化 ＆ GSAPポップアニメーション
          if (targetSvgPart) {
            targetSvgPart.classList.add('active');
            gsap.fromTo(targetSvgPart, { scale: 1.1 }, { scale: 1, duration: 0.3 });
          }
        } else {
          totalPrice -= price;
          if (targetSvgPart) {
            targetSvgPart.classList.remove('active');
          }
        }

        // 合計金額の更新
        totalEl.textContent = `¥${totalPrice.toLocaleString()}`;
      });
    });

    // ==========================================
    // 3. LINE見積もり送信連携
    // ==========================================
    document.getElementById('btn-line-send').addEventListener('click', () => {
      const selected = Array.from(document.querySelectorAll('.sim-opt.on'));
      if (selected.length === 0) {
        alert('カスタムパーツを1つ以上選択してください。');
        return;
      }
      
      let msg = "【ハイエース荷室カスタム見積相談】\n";
      selected.forEach(o => {
        const name = o.querySelector('span:first-child').textContent;
        const price = o.querySelector('span:last-child').textContent;
        msg += `・${name} (${price})\n`;
      });
      msg += `-------------------\n概算合計: ¥${totalPrice.toLocaleString()}\n\nこちらの構成で詳細の相談をお願いします！`;

      const lineUrl = `https://line.me/R/share?text=${encodeURIComponent(msg)}`;
      window.open(lineUrl, '_blank');
    });

    // ==========================================
    // 4. GAS (Google Apps Script) バックエンド連携
    // ==========================================
    // 💡注意: 以下に作成したGASをデプロイしたウェブアプリURLを貼り付けます
    const GAS_WEBAPP_URL = "YOUR_GAS_WEB_APP_URL_HERE";

    // リアルタイム在庫データの取得 (GET)
    async function fetchStockData() {
      const container = document.getElementById('stock-container');
      
      if(GAS_WEBAPP_URL === "YOUR_GAS_WEB_APP_URL_HERE") {
        // GAS URLが未設定時のフォールバック表示
        container.innerHTML = `
          <div class="stock-card">
            <h4>頑丈重荷重 床張りキット</h4>
            <span class="stock-status status-ok">在庫あり (即納)</span>
          </div>
          <div class="stock-card">
            <h4>100V サブバッテリー</h4>
            <span class="stock-status status-low">残り2点</span>
          </div>
        `;
        return;
      }

      try {
        const res = await fetch(GAS_WEBAPP_URL);
        const data = await res.json();
        
        container.innerHTML = "";
        data.forEach(item => {
          const card = document.createElement('div');
          card.className = 'stock-card';
          card.innerHTML = `
            <h4>${item.name}</h4>
            <span class="stock-status ${item.stock > 3 ? 'status-ok' : 'status-low'}">
              ${item.stock > 0 ? `在庫あり (${item.stock}点)` : '入荷待ち'}
            </span>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        container.innerHTML = "在庫データの取得に失敗しました。";
      }
    }

    // 予約フォーム送信 (POST)
    document.getElementById('gas-booking-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btn-submit-booking');
      btn.disabled = true;
      btn.textContent = "送信中...";

      const payload = {
        name: document.getElementById('book-name').value,
        plan: document.getElementById('book-plan').value,
        date: document.getElementById('book-date').value,
        totalEstimate: totalPrice
      };

      if(GAS_WEBAPP_URL === "YOUR_GAS_WEB_APP_URL_HERE") {
        alert("【デモ処理】GASのURLを設定するとスプレッドシートへ自動保存されます。\n送信内容: " + JSON.stringify(payload));
        btn.disabled = false;
        btn.textContent = "GASへ送信して予約を確定する";
        return;
      }

      try {
        await fetch(GAS_WEBAPP_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        alert("予約が正常に完了しました！担当者よりご連絡いたします。");
      } catch (err) {
        alert("送信に失敗しました。時間をおいて再度お試しください。");
      } finally {
        btn.disabled = false;
        btn.textContent = "GASへ送信して予約を確定する";
      }
    });

    // 初期実行
    fetchStockData();
  </script>
</body>
</html>
